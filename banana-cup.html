<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🍌 バナナカップ Par3</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a3d0a; overflow: hidden; touch-action: none; user-select: none; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const W = () => canvas.width;
const H = () => canvas.height;

// ── コースレイアウト定数（W/H の比率で定義） ─────────────────
const COURSE = {
  // グリーン中心
  green:        () => ({ x: W()*0.5,  y: H()*0.13, rx: W()*0.17, ry: H()*0.085 }),
  // カップ位置
  cup:          () => ({ x: W()*0.5,  y: H()*0.105, r: W()*0.048 }),
  // 左バンカー
  bunkerL:      () => ({ x: W()*0.27, y: H()*0.185, rx: W()*0.10, ry: H()*0.04 }),
  // 右バンカー
  bunkerR:      () => ({ x: W()*0.73, y: H()*0.185, rx: W()*0.10, ry: H()*0.04 }),
  // 池（左サイド）
  pond:         () => ({ x: W()*0.19, y: H()*0.46,  rx: W()*0.14, ry: H()*0.10 }),
  // フェアウェイ（中央帯：x範囲）
  fairwayXL:    () => W()*0.28,
  fairwayXR:    () => W()*0.72,
  // ティーグラウンド
  tee:          () => ({ x: W()*0.5,  y: H()*0.88,  w: W()*0.16, h: H()*0.04 }),
  // 発射位置
  launchY:      () => H()*0.86,
};

// ── ゲーム状態 ────────────────────────────────────────────────
let bananas    = [];   // 着地済みバナナ {x,y,rot,type}
let cupBananas = [];   // カップ内バナナ
let flying     = null;
let touchStart = null, touchCurrent = null;
let score = 0, attempts = 0;
let flashTimer = 0, celebTimer = 0;
let message = '';      // 結果メッセージ
let messageTimer = 0;

const GRAVITY  = 0.32;
const MAX_POWER = 24;

// ── ハザード判定 ───────────────────────────────────────────────
function inEllipse(px, py, ex, ey, rx, ry) {
  return ((px-ex)**2/(rx**2) + (py-ey)**2/(ry**2)) <= 1;
}
function getLandType(x, y) {
  const c  = COURSE.cup();
  const g  = COURSE.green();
  const bl = COURSE.bunkerL();
  const br = COURSE.bunkerR();
  const p  = COURSE.pond();
  if (Math.hypot(x - c.x, y - c.y) < c.r * 1.1) return 'cup';
  if (inEllipse(x, y, p.x,  p.y,  p.rx,  p.ry))  return 'water';
  if (inEllipse(x, y, bl.x, bl.y, bl.rx, bl.ry)) return 'bunker';
  if (inEllipse(x, y, br.x, br.y, br.rx, br.ry)) return 'bunker';
  if (inEllipse(x, y, g.x,  g.y,  g.rx,  g.ry))  return 'green';
  const fxl = COURSE.fairwayXL(), fxr = COURSE.fairwayXR();
  if (x > fxl && x < fxr) return 'fairway';
  return 'rough';
}

// ── Web Audio ─────────────────────────────────────────────────
let audioCtx = null;
function ac() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playSuccess() {
  const a = ac();
  [523, 659, 784, 1047].forEach((f, i) => {
    const osc = a.createOscillator(), g = a.createGain();
    osc.connect(g); g.connect(a.destination);
    osc.frequency.value = f; osc.type = 'sine';
    const t = a.currentTime + i * 0.13;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.35, t + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.28);
    osc.start(t); osc.stop(t + 0.3);
  });
}

function playThud() {
  const a = ac(), n = Math.floor(a.sampleRate * 0.12);
  const buf = a.createBuffer(1, n, a.sampleRate), d = buf.getChannelData(0);
  for (let i = 0; i < n; i++) d[i] = (Math.random()*2-1) * Math.exp(-i/(n*0.18));
  const src = a.createBufferSource(), g = a.createGain();
  src.buffer = buf; g.gain.value = 0.4;
  src.connect(g); g.connect(a.destination); src.start();
}

function playSplash() {
  // ホワイトノイズ + 下降ピッチで水のじゃぼん音
  const a = ac(), n = Math.floor(a.sampleRate * 0.5);
  const buf = a.createBuffer(1, n, a.sampleRate), d = buf.getChannelData(0);
  for (let i = 0; i < n; i++) d[i] = (Math.random()*2-1) * Math.exp(-i/(n*0.35));
  const src = a.createBufferSource();
  src.buffer = buf;
  const filter = a.createBiquadFilter();
  filter.type = 'bandpass'; filter.frequency.value = 800;
  filter.frequency.exponentialRampToValueAtTime(200, a.currentTime + 0.4);
  const g = a.createGain(); g.gain.value = 0.5;
  src.connect(filter); filter.connect(g); g.connect(a.destination);
  src.start();
  // 追加のじゃぼん音（低音）
  const osc = a.createOscillator(), og = a.createGain();
  osc.type = 'sine'; osc.frequency.setValueAtTime(280, a.currentTime);
  osc.frequency.exponentialRampToValueAtTime(80, a.currentTime + 0.3);
  og.gain.setValueAtTime(0.3, a.currentTime);
  og.gain.exponentialRampToValueAtTime(0.001, a.currentTime + 0.3);
  osc.connect(og); og.connect(a.destination);
  osc.start(); osc.stop(a.currentTime + 0.35);
}

function playSand() {
  // ざっという砂音 + 鈍い衝撃
  const a = ac(), n = Math.floor(a.sampleRate * 0.3);
  const buf = a.createBuffer(1, n, a.sampleRate), d = buf.getChannelData(0);
  for (let i = 0; i < n; i++) d[i] = (Math.random()*2-1) * Math.pow(Math.max(0, 1-i/(n*0.6)), 1.5);
  const src = a.createBufferSource();
  src.buffer = buf;
  const filter = a.createBiquadFilter();
  filter.type = 'highpass'; filter.frequency.value = 2000;
  const g = a.createGain(); g.gain.value = 0.35;
  src.connect(filter); filter.connect(g); g.connect(a.destination); src.start();
  // 鈍い衝撃
  const osc2 = a.createOscillator(), g2 = a.createGain();
  osc2.type = 'triangle'; osc2.frequency.value = 120;
  g2.gain.setValueAtTime(0.2, a.currentTime);
  g2.gain.exponentialRampToValueAtTime(0.001, a.currentTime + 0.15);
  osc2.connect(g2); g2.connect(a.destination);
  osc2.start(); osc2.stop(a.currentTime + 0.18);
}

function playWhoosh() {
  const a = ac(), osc = a.createOscillator(), g = a.createGain();
  osc.connect(g); g.connect(a.destination);
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(380, a.currentTime);
  osc.frequency.exponentialRampToValueAtTime(90, a.currentTime + 0.28);
  g.gain.setValueAtTime(0.12, a.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + 0.28);
  osc.start(a.currentTime); osc.stop(a.currentTime + 0.3);
}

// ── タッチ / マウス ───────────────────────────────────────────
function pointerStart(x, y) {
  if (flying) return;
  touchStart = { x, y }; touchCurrent = { x, y };
}
function pointerMove(x, y) {
  if (!touchStart) return;
  touchCurrent = { x, y };
}
function pointerEnd() {
  if (!touchStart || flying) { touchStart = null; return; }
  const dx = touchCurrent.x - touchStart.x;
  const dy = touchCurrent.y - touchStart.y;
  const dist = Math.hypot(dx, dy);
  if (dist < 8) { touchStart = null; touchCurrent = null; return; }
  const power = Math.min(dist / 11, MAX_POWER);
  const angle = Math.atan2(dy, dx);
  launch(Math.cos(angle) * power, Math.sin(angle) * power);
  touchStart = null; touchCurrent = null;
}

canvas.addEventListener('touchstart', e => { e.preventDefault(); pointerStart(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
canvas.addEventListener('touchmove',  e => { e.preventDefault(); pointerMove(e.touches[0].clientX, e.touches[0].clientY); },  { passive: false });
canvas.addEventListener('touchend',   e => { e.preventDefault(); pointerEnd(); }, { passive: false });
canvas.addEventListener('mousedown',  e => pointerStart(e.clientX, e.clientY));
canvas.addEventListener('mousemove',  e => pointerMove(e.clientX, e.clientY));
canvas.addEventListener('mouseup',    () => pointerEnd());

// ── 発射 ─────────────────────────────────────────────────────
function launch(vx, vy) {
  flying = {
    x: W() * 0.5, y: COURSE.launchY(),
    vx, vy, rot: 0, trail: [], age: 0,
  };
  attempts++;
  playWhoosh();
}

// ── 更新 ─────────────────────────────────────────────────────
function update() {
  if (flashTimer  > 0) flashTimer--;
  if (celebTimer  > 0) celebTimer--;
  if (messageTimer > 0) messageTimer--;
  if (!flying) return;

  flying.trail.push({ x: flying.x, y: flying.y });
  if (flying.trail.length > 22) flying.trail.shift();

  flying.x  += flying.vx;
  flying.y  += flying.vy;
  flying.vy += GRAVITY;
  flying.rot += flying.vx * 0.06;
  flying.age++;

  // カップイン判定（上昇・下降どちらでも判定、当たり判定は視覚半径の2倍）
  const cup = COURSE.cup();
  if (Math.hypot(flying.x - cup.x, flying.y - cup.y) < cup.r * 6.0) {
    score++;
    flashTimer = 45; celebTimer = 70;
    message = 'カップイン！'; messageTimer = 120;
    playSuccess();
    cupBananas.push({ x: cup.x + (Math.random()-0.5)*16, y: cup.y, rot: (Math.random()-0.5)*0.7 });
    flying = null; return;
  }

  // 地面着地
  const floorY = H() * 0.96;
  if (flying.y > floorY || flying.x < -80 || flying.x > W()+80 || flying.y < -300) {
    const lx = Math.max(20, Math.min(W()-20, flying.x));
    const ly = Math.min(floorY - 10, flying.y);
    const type = getLandType(lx, ly);

    if (type === 'water') {
      playSplash();
      message = 'ウォーターハザード！'; messageTimer = 90;
      // 水しぶきエフェクト用（着地だが表示なし）
    } else if (type === 'bunker') {
      playSand();
      message = 'バンカーイン！'; messageTimer = 90;
      bananas.push({ x: lx, y: ly, rot: Math.random()*Math.PI*2, type });
    } else {
      playThud();
      const msgs = { green: 'グリーンオン！', fairway: 'フェアウェイキープ', rough: 'ラフ…', cup: '' };
      message = msgs[type] || '';
      messageTimer = 70;
      bananas.push({ x: lx, y: ly, rot: Math.random()*Math.PI*2, type });
    }
    flying = null;
  }
}

// ── バナナ ベクター描画 ────────────────────────────────────────
function drawBanana(x, y, rot, size) {
  const s = size / 72;
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot);
  ctx.scale(s, s);

  ctx.beginPath();
  ctx.moveTo(-34, 2);
  ctx.bezierCurveTo(-32, -18, 32, -18, 34, 2);   // 外弧（上・凸）
  ctx.bezierCurveTo(37,  8, 31, 14, 26, 9);        // 右先端
  ctx.bezierCurveTo(12, -5, -12, -5, -26, 9);      // 内弧（下・浅め）
  ctx.bezierCurveTo(-31, 14, -37, 8, -34, 2);      // 左先端
  ctx.closePath();

  const grad = ctx.createLinearGradient(0, -18, 0, 14);
  grad.addColorStop(0,   '#FFF176');
  grad.addColorStop(0.45,'#FFD600');
  grad.addColorStop(1,   '#F9A825');
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.strokeStyle = '#B8860B';
  ctx.lineWidth = 2 / s;
  ctx.stroke();

  // へた
  ctx.fillStyle = '#5D2E00';
  ctx.beginPath(); ctx.arc(-34, 2, 4, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc( 34, 2, 4, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

// ── コース描画 ────────────────────────────────────────────────
function drawCourse() {
  const w = W(), h = H();
  const fxl = COURSE.fairwayXL(), fxr = COURSE.fairwayXR();
  const g   = COURSE.green();
  const bl  = COURSE.bunkerL();
  const br  = COURSE.bunkerR();
  const p   = COURSE.pond();
  const tee = COURSE.tee();

  // ── ラフ（背景）
  const rough = ctx.createLinearGradient(0, 0, 0, h);
  rough.addColorStop(0, '#1b4010');
  rough.addColorStop(1, '#1e4a12');
  ctx.fillStyle = rough;
  ctx.fillRect(0, 0, w, h);

  // ── フェアウェイ
  ctx.save();
  ctx.beginPath();
  // フェアウェイを台形に（グリーン側がやや広め）
  ctx.moveTo(fxl - w*0.03, h*0.22);
  ctx.lineTo(fxr + w*0.03, h*0.22);
  ctx.lineTo(fxr, h*0.95);
  ctx.lineTo(fxl, h*0.95);
  ctx.closePath();
  const fw = ctx.createLinearGradient(0, h*0.22, 0, h*0.95);
  fw.addColorStop(0, '#3d8b2a');
  fw.addColorStop(1, '#4a9e30');
  ctx.fillStyle = fw;
  ctx.fill();
  ctx.restore();

  // 芝目（縦縞）
  ctx.save();
  ctx.globalAlpha = 0.07;
  for (let yy = h*0.22; yy < h*0.95; yy += h*0.04) {
    ctx.fillStyle = yy % (h*0.08) < h*0.04 ? '#000' : '#fff';
    ctx.fillRect(fxl, yy, fxr - fxl, h*0.04);
  }
  ctx.globalAlpha = 1;
  ctx.restore();

  // ── 池
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(p.x, p.y, p.rx, p.ry, -0.2, 0, Math.PI*2);
  const pg = ctx.createRadialGradient(p.x - p.rx*0.2, p.y - p.ry*0.2, p.ry*0.1, p.x, p.y, p.rx);
  pg.addColorStop(0,   '#6dd5fa');
  pg.addColorStop(0.5, '#2980b9');
  pg.addColorStop(1,   '#1a5276');
  ctx.fillStyle = pg;
  ctx.fill();
  ctx.strokeStyle = '#1a6e8a';
  ctx.lineWidth = 2;
  ctx.stroke();
  // 池の波紋
  ctx.strokeStyle = 'rgba(255,255,255,0.18)';
  ctx.lineWidth = 1;
  for (let i = 1; i <= 3; i++) {
    ctx.beginPath();
    ctx.ellipse(p.x, p.y, p.rx * (0.3 + i*0.2), p.ry * (0.3 + i*0.2), -0.2, 0, Math.PI*2);
    ctx.stroke();
  }
  // OBマーク
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.font = `bold ${w*0.035}px sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('WATER', p.x, p.y);
  ctx.restore();

  // ── バンカー（左）
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(bl.x, bl.y, bl.rx, bl.ry, 0.15, 0, Math.PI*2);
  const sg = ctx.createRadialGradient(bl.x, bl.y, bl.ry*0.1, bl.x, bl.y, bl.rx);
  sg.addColorStop(0, '#f5e6b0');
  sg.addColorStop(1, '#d4b96a');
  ctx.fillStyle = sg;
  ctx.fill();
  ctx.strokeStyle = '#b8962a';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.fillStyle = 'rgba(100,70,0,0.4)';
  ctx.font = `bold ${w*0.028}px sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('SAND', bl.x, bl.y);
  ctx.restore();

  // ── バンカー（右）
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(br.x, br.y, br.rx, br.ry, -0.15, 0, Math.PI*2);
  ctx.fillStyle = ctx.createRadialGradient(br.x, br.y, br.ry*0.1, br.x, br.y, br.rx);
  const sg2 = ctx.createRadialGradient(br.x, br.y, br.ry*0.1, br.x, br.y, br.rx);
  sg2.addColorStop(0, '#f5e6b0');
  sg2.addColorStop(1, '#d4b96a');
  ctx.fillStyle = sg2;
  ctx.fill();
  ctx.strokeStyle = '#b8962a';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.fillStyle = 'rgba(100,70,0,0.4)';
  ctx.font = `bold ${w*0.028}px sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('SAND', br.x, br.y);
  ctx.restore();

  // ── グリーン
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(g.x, g.y, g.rx, g.ry, 0, 0, Math.PI*2);
  const gg = ctx.createRadialGradient(g.x, g.y, g.ry*0.1, g.x, g.y, g.rx);
  gg.addColorStop(0, '#66bb44');
  gg.addColorStop(1, '#4a9e30');
  ctx.fillStyle = gg;
  ctx.fill();
  ctx.strokeStyle = '#3a8222';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.restore();

  // ── ティーグラウンド
  ctx.save();
  ctx.beginPath();
  ctx.roundRect(tee.x - tee.w/2, tee.y - tee.h/2, tee.w, tee.h, 6);
  ctx.fillStyle = '#5ab33a';
  ctx.fill();
  ctx.strokeStyle = '#3a8222';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.font = `bold ${w*0.028}px sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('TEE', tee.x, tee.y);
  ctx.restore();

  // ── ヤード表示
  ctx.save();
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = `${w*0.025}px sans-serif`;
  ctx.textAlign = 'right';
  ctx.fillText('Par 3 / 150Y', w - 10, h*0.96);
  ctx.restore();
}

function drawCup() {
  const cup = COURSE.cup();
  const cx = cup.x, cy = cup.y, r = cup.r;

  // 穴の影
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(cx, cy+3, r, r*0.38, 0, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fill();
  ctx.restore();

  // 穴
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(cx, cy, r, r*0.36, 0, 0, Math.PI*2);
  ctx.fillStyle = '#080808';
  ctx.fill();
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.restore();

  // ポール
  const poleH = H() * 0.065;
  ctx.save();
  ctx.strokeStyle = '#ddd';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(cx+2, cy-4);
  ctx.lineTo(cx+2, cy - poleH);
  ctx.stroke();
  // フラッグ
  ctx.fillStyle = '#e00';
  ctx.beginPath();
  ctx.moveTo(cx+2,       cy - poleH);
  ctx.lineTo(cx+2+poleH*0.55, cy - poleH*0.72);
  ctx.lineTo(cx+2,       cy - poleH*0.45);
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  // カップ内バナナ
  cupBananas.forEach(b => drawBanana(b.x, b.y - 10, b.rot, 36));
}

function drawLanded() {
  bananas.forEach(b => {
    if (b.type === 'bunker') {
      // バンカー内：砂に埋まってる感じで半透明
      ctx.save(); ctx.globalAlpha = 0.75; ctx.restore();
    }
    drawBanana(b.x, b.y, b.rot, 52);
  });
}

function drawFlying() {
  if (!flying) return;
  ctx.save();
  flying.trail.forEach((p, i) => {
    const a = (i / flying.trail.length) * 0.55;
    const s = 4.5 * (i / flying.trail.length);
    ctx.beginPath();
    ctx.arc(p.x, p.y, s, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,230,0,${a})`;
    ctx.fill();
  });
  ctx.restore();
  drawBanana(flying.x, flying.y, flying.rot, 62);
}

function drawLauncher() {
  if (flying) return;
  drawBanana(W()*0.5, COURSE.launchY(), 0, 66);
}

function drawAimGuide() {
  if (!touchStart || !touchCurrent || flying) return;
  const dx = touchCurrent.x - touchStart.x;
  const dy = touchCurrent.y - touchStart.y;
  const dist = Math.hypot(dx, dy);
  if (dist < 6) return;
  const power = Math.min(dist / 11, MAX_POWER);
  const angle = Math.atan2(dy, dx);

  let px = W()*0.5, py = COURSE.launchY();
  let pvx = Math.cos(angle)*power, pvy = Math.sin(angle)*power;

  ctx.save();
  ctx.setLineDash([7, 9]);
  ctx.lineWidth = 2.2;
  ctx.strokeStyle = 'rgba(255,255,100,0.6)';
  ctx.beginPath(); ctx.moveTo(px, py);
  for (let i = 0; i < 90; i++) {
    px += pvx; py += pvy; pvy += GRAVITY;
    if (py > H() || px < -80 || px > W()+80) break;
    ctx.lineTo(px, py);
  }
  ctx.stroke();

  // パワーゲージ
  const pct = power / MAX_POWER;
  const gw = W()*0.32, gh = H()*0.013;
  const gx = W()/2 - gw/2, gy = H()*0.95;
  ctx.setLineDash([]);
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.roundRect(gx, gy, gw, gh, 4); ctx.fill();
  const hue = 110 - pct * 110;
  ctx.fillStyle = `hsl(${hue},90%,50%)`;
  ctx.roundRect(gx, gy, gw*pct, gh, 4); ctx.fill();
  ctx.restore();
}

function drawFlash() {
  if (flashTimer <= 0) return;
  const a = (flashTimer / 45) * 0.35;
  ctx.fillStyle = `rgba(255,240,50,${a})`;
  ctx.fillRect(0, 0, W(), H());
}

function drawMessage() {
  if (!message || messageTimer <= 0) return;
  const alpha = Math.min(1, messageTimer / 20);
  ctx.save();
  ctx.textAlign = 'center';
  ctx.font = `bold ${W()*0.075}px sans-serif`;
  ctx.fillStyle = `rgba(255,255,255,${alpha})`;
  ctx.shadowColor = 'rgba(0,0,0,0.8)';
  ctx.shadowBlur = 8;
  ctx.fillText(message, W()/2, H()*0.5);
  ctx.restore();
}

function drawUI() {
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.roundRect(10, H()*0.015, W()*0.35, H()*0.055, 8); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.font = `bold ${W()*0.042}px sans-serif`;
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText(`IN: ${score} / ${attempts}`, 18, H()*0.042);
  if (attempts === 0) {
    ctx.textAlign = 'center';
    ctx.font = `${W()*0.042}px sans-serif`;
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.fillText('スワイプでバナナを投げよう！', W()/2, H()*0.72);
  }
  ctx.restore();
}

// ── メインループ ─────────────────────────────────────────────
function loop() {
  update();
  drawCourse();
  drawFlash();
  drawCup();
  drawLanded();
  drawFlying();
  drawLauncher();
  drawAimGuide();
  drawMessage();
  drawUI();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
